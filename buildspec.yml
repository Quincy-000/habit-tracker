version: 0.2

env:
  variables:
    IMAGE_REPO_NAME: "habit-tracker"
    AWS_REGION: "us-east-1"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing Trivy..."
      - wget -qO- https://github.com/aquasecurity/trivy/releases/latest/download/trivy_Linux-64bit.tar.gz | tar xz -C /usr/local/bin trivy
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Running tests..."
      - pytest -v
      - echo "Logging in to Amazon ECR..."
      - aws --version
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG -t $REPOSITORY_URI:latest .
      - echo "Scanning image with Trivy..."
      - trivy image --severity HIGH,CRITICAL --exit-code 1 --no-progress $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo "Trivy scan passed. Pushing image to ECR..."
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - docker push $REPOSITORY_URI:latest
      - echo "Writing imagedefinitions.json for later deploy stage..."
      - printf '[{"name":"habit-tracker","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
